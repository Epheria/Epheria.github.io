# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Change the following value to '/PROJECT_NAME' ONLY IF your site type is GitHub Pages Project sites
# and doesn't have a custom domain.
baseurl: ""

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: ko

# Change to your timezone › http://www.timezoneconverter.com/cgi-bin/findzone/findzone
timezone: Asia/Seoul

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Sehyup # the main title

tagline: Game Programmer # it will display as the sub-title

description: >- # used by seo meta and the atom feed
  Technical Summary Blog - Portfolio and Development Challenges

# fill in the protocol & hostname for your site, e.g., 'https://username.github.io'
url: "https://Epheria.github.io"

github:
  username: Epheria # change to your github username

twitter:
  username: Ssehyup # change to your twitter username

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Sehyup
  email: tpguq1104@naver.com # change to your email address
  links:
    # The first element serves as the copyright owner's link
    # change to your twitter homepage
    - https://Epheria.github.io # change to your github homepage
    - https://twitter.com/Ssehyup
    # Uncomment below to add more social links
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

google_site_verification: googlecdbb33ee12dee5e1.html # fill in to your verification string

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

google_analytics:
  id: G-3GL54C48GF # fill in your Google Analytics ID

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
#
# Available options:
#
#     light  - Use the light color scheme
#     dark   - Use the dark color scheme
#
theme_mode:

# The CDN endpoint for images.
# Notice that once it is assigned, the CDN url
# will be added to all image (site avatar & posts' images) paths starting with '/'
#
# e.g. 'https://cdn.com'
img_cdn:

# the avatar on sidebar, support local or CORS resources
avatar: /assets/img/profile.png

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  active: utterances # The global switch for posts comments, e.g., 'disqus'.  Keep it empty means disable
  # The active options are as follows:
  disqus:
    shortname: # fill with the Disqus shortname. › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances settings › https://utteranc.es/
  utterances:
    repo: Epheria/Epheria.github.io # <gh-username>/<repo>
    issue_term: pathname # < url | pathname | title | ...>
  # Giscus options › https://giscus.app
  giscus:
    repo: # <gh-username>/<repo>
    repo_id:
    category:
    category_id:
    mapping: # optional, default to 'pathname'
    input_position: # optional, default to 'bottom'
    lang: # optional, default to the value of `site.lang`
    reactions_enabled: # optional, default to the value of `1`

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # boolean, keep empty means false
    # specify the Jekyll environment, empty means both
    # only works if `assets.self_host.enabled` is 'true'
    env: # [development|production]

pwa:
  enabled: true # the option for PWA feature

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      image: /assets/img/og-default.png
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  # Category-specific OG images
  - scope:
      path: _posts/Common
      type: posts
    values:
      image: /assets/img/og/common.png
  - scope:
      path: _posts/Csharp
      type: posts
    values:
      image: /assets/img/og/csharp.png
  - scope:
      path: _posts/cpp
      type: posts
    values:
      image: /assets/img/og/cpp.png
  - scope:
      path: _posts/ETC
      type: posts
    values:
      image: /assets/img/og/etc.png
  - scope:
      path: _posts/Investment
      type: posts
    values:
      image: /assets/img/og/investment.png
  - scope:
      path: _posts/Language
      type: posts
    values:
      image: /assets/img/og/language.png
  - scope:
      path: _posts/Mathematics
      type: posts
    values:
      image: /assets/img/og/mathematics.png
  - scope:
      path: _posts/ML
      type: posts
    values:
      image: /assets/img/og/ml.png
  - scope:
      path: _posts/Pobos
      type: posts
    values:
      image: /assets/img/og/pobos.png
  - scope:
      path: _posts/Python
      type: posts
    values:
      image: /assets/img/og/python.png
  - scope:
      path: _posts/Survivor
      type: posts
    values:
      image: /assets/img/og/survivor.png
  - scope:
      path: _posts/TheQuesting
      type: posts
    values:
      image: /assets/img/og/thequesting.png
  - scope:
      path: _posts/Toyverse
      type: posts
    values:
      image: /assets/img/og/toyverse.png
  - scope:
      path: _posts/Unity
      type: posts
    values:
      image: /assets/img/og/unity.png
  - scope:
      path: _posts/Unreal
      type: posts
    values:
      image: /assets/img/og/unreal.png
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - rollup.config.js
  - node_modules
  - package*.json

# jekyll-polyglot 다국어 설정
languages: ["ko", "en", "ja"]
default_lang: "ko"
exclude_from_localization: ["assets/js", "assets/css", "assets/img", "assets/lib"]
parallel_localization: false

plugins:
  - jekyll-polyglot

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
