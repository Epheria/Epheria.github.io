<!-- D3.js Force-Directed Graph Rendering -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  'use strict';

  var data = window.__graphData;
  if (!data) return;

  // ===== 카테고리 색상 팔레트 =====
  var CATEGORY_COLORS = {
    'Unity':       '#4A90D9',
    'Unreal':      '#E74C3C',
    'AI':          '#9B59B6',
    'Common':      '#2ECC71',
    'Csharp':      '#1ABC9C',
    'ETC':         '#95A5A6',
    'Language':    '#E67E22',
    'Python':      '#F1C40F',
    'ML':          '#8E44AD',
    'Mathematics': '#3498DB',
    'Toyverse':    '#E91E63',
    'TheQuesting': '#FF7043',
    'Survivor':    '#26A69A',
    'Investment':  '#42A5F5',
    'Pobos':       '#78909C'
  };
  var DEFAULT_COLOR = '#7f8c8d';

  function getColor(cat) {
    return CATEGORY_COLORS[cat] || DEFAULT_COLOR;
  }

  // ===== 에지 스타일 =====
  var EDGE_STYLES = {
    series:       { color: '#4A90D9', width: 2, opacity: 0.6, dash: '' },
    prerequisite: { color: '#E67E22', width: 2, opacity: 0.7, dash: '6,3' },
    tag:          { color: '#95A5A6', width: 1, opacity: 0.3, dash: '' }
  };

  // ===== SVG 초기화 =====
  var container = document.getElementById('graph-container');
  var svg = d3.select('#graph-svg');
  var width = container.clientWidth;
  var height = Math.max(600, window.innerHeight - 320);

  svg.attr('width', width).attr('height', height);

  // ===== 줌/패닝 =====
  var g = svg.append('g');
  var zoom = d3.zoom()
    .scaleExtent([0.1, 5])
    .on('zoom', function(event) {
      g.attr('transform', event.transform);
    });
  svg.call(zoom);

  // ===== 시뮬레이션 데이터 준비 =====
  var nodes = data.nodes.map(function(d) { return Object.assign({}, d); });
  var edges = data.edges.map(function(d) { return Object.assign({}, d); });

  // ===== Force Simulation =====
  var simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(function(d) { return d.id; }).distance(function(d) {
      if (d.type === 'series') return 60;
      if (d.type === 'prerequisite') return 80;
      return 120;
    }))
    .force('charge', d3.forceManyBody().strength(-150).distanceMax(400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(12))
    .force('x', d3.forceX(width / 2).strength(0.03))
    .force('y', d3.forceY(height / 2).strength(0.03));

  // ===== 에지 렌더링 =====
  var linkGroup = g.append('g').attr('class', 'graph-links');
  var link = linkGroup.selectAll('line')
    .data(edges)
    .join('line')
    .attr('stroke', function(d) { return EDGE_STYLES[d.type].color; })
    .attr('stroke-width', function(d) { return EDGE_STYLES[d.type].width; })
    .attr('stroke-opacity', function(d) { return EDGE_STYLES[d.type].opacity; })
    .attr('stroke-dasharray', function(d) { return EDGE_STYLES[d.type].dash; });

  // ===== 화살표 마커 (prerequisite용) =====
  svg.append('defs').append('marker')
    .attr('id', 'arrow-prerequisite')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 18)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', EDGE_STYLES.prerequisite.color);

  link.filter(function(d) { return d.type === 'prerequisite'; })
    .attr('marker-end', 'url(#arrow-prerequisite)');

  // ===== 노드 렌더링 =====
  var nodeGroup = g.append('g').attr('class', 'graph-nodes');
  var node = nodeGroup.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'graph-node')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  node.append('circle')
    .attr('r', function(d) {
      // 연결이 많을수록 큰 노드
      var linkCount = edges.filter(function(e) {
        return (e.source === d || e.source === d.id || e.source.id === d.id) ||
               (e.target === d || e.target === d.id || e.target.id === d.id);
      }).length;
      return Math.min(4 + linkCount * 1.2, 14);
    })
    .attr('fill', function(d) { return getColor(d.cat0); })
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5);

  // ===== 툴팁 =====
  var tooltip = d3.select('#graph-tooltip');

  node.on('mouseover', function(event, d) {
    tooltip
      .style('display', 'block')
      .style('left', (event.pageX + 12) + 'px')
      .style('top', (event.pageY - 12) + 'px')
      .html(
        '<strong>' + d.title + '</strong><br>' +
        '<span class="tt-cat">' + d.cat0 + (d.cat1 ? ' / ' + d.cat1 : '') + '</span><br>' +
        '<span class="tt-date">' + d.date + '</span>' +
        (d.tags && d.tags.length ? '<br><span class="tt-tags">' + d.tags.slice(0, 5).join(', ') + '</span>' : '')
      );

    // 연결된 노드/에지 하이라이트
    var connected = {};
    connected[d.id] = true;
    link.attr('stroke-opacity', function(l) {
      var src = l.source.id || l.source;
      var tgt = l.target.id || l.target;
      if (src === d.id || tgt === d.id) {
        connected[src] = true;
        connected[tgt] = true;
        return 1;
      }
      return 0.05;
    }).attr('stroke-width', function(l) {
      var src = l.source.id || l.source;
      var tgt = l.target.id || l.target;
      return (src === d.id || tgt === d.id) ? 3 : EDGE_STYLES[l.type].width;
    });

    node.select('circle').attr('opacity', function(n) {
      return connected[n.id] ? 1 : 0.15;
    });
  })
  .on('mousemove', function(event) {
    tooltip
      .style('left', (event.pageX + 12) + 'px')
      .style('top', (event.pageY - 12) + 'px');
  })
  .on('mouseout', function() {
    tooltip.style('display', 'none');
    link.attr('stroke-opacity', function(d) { return EDGE_STYLES[d.type].opacity; })
        .attr('stroke-width', function(d) { return EDGE_STYLES[d.type].width; });
    node.select('circle').attr('opacity', 1);
  })
  .on('click', function(event, d) {
    window.location.href = d.id;
  });

  // ===== 시뮬레이션 tick =====
  simulation.on('tick', function() {
    link
      .attr('x1', function(d) { return d.source.x; })
      .attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; })
      .attr('y2', function(d) { return d.target.y; });

    node.attr('transform', function(d) {
      return 'translate(' + d.x + ',' + d.y + ')';
    });
  });

  // ===== 드래그 핸들러 =====
  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }

  // ===== 카테고리 필터 드롭다운 채우기 =====
  var categories = {};
  nodes.forEach(function(n) { if (n.cat0) categories[n.cat0] = true; });
  var catSelect = document.getElementById('graph-category-filter');
  Object.keys(categories).sort().forEach(function(cat) {
    var opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    catSelect.appendChild(opt);
  });

  // ===== 필터링 로직 =====
  function applyFilters() {
    var catVal = catSelect.value;
    var edgeVal = document.getElementById('graph-edge-filter').value;
    var searchVal = document.getElementById('graph-search').value.toLowerCase().trim();

    // 노드 필터
    var visibleNodes = {};
    nodes.forEach(function(n) {
      var catMatch = (catVal === 'all' || n.cat0 === catVal);
      var searchMatch = (!searchVal || n.title.toLowerCase().indexOf(searchVal) >= 0);
      visibleNodes[n.id] = catMatch && searchMatch;
    });

    // 에지 필터 (타입 + 양쪽 노드 visible)
    link.attr('display', function(d) {
      var src = d.source.id || d.source;
      var tgt = d.target.id || d.target;
      var edgeMatch = (edgeVal === 'all' || d.type === edgeVal);
      return (edgeMatch && visibleNodes[src] && visibleNodes[tgt]) ? null : 'none';
    });

    // 검색 모드: 검색어가 있으면 매칭 안 되는 노드는 연결된 노드라도 희미하게
    if (searchVal) {
      node.select('circle').attr('opacity', function(n) {
        return visibleNodes[n.id] ? 1 : 0.1;
      });
    } else {
      node.select('circle').attr('opacity', function(n) {
        return (catVal === 'all' || n.cat0 === catVal) ? 1 : 0.1;
      });
    }
  }

  catSelect.addEventListener('change', applyFilters);
  document.getElementById('graph-edge-filter').addEventListener('change', applyFilters);

  var searchTimer;
  document.getElementById('graph-search').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilters, 200);
  });

  // ===== 리사이즈 =====
  window.addEventListener('resize', function() {
    width = container.clientWidth;
    height = Math.max(600, window.innerHeight - 320);
    svg.attr('width', width).attr('height', height);
    simulation.force('center', d3.forceCenter(width / 2, height / 2));
    simulation.alpha(0.3).restart();
  });

  // 초기 줌: 전체 그래프가 보이도록
  simulation.on('end', function() {
    var bounds = g.node().getBBox();
    if (bounds.width === 0 || bounds.height === 0) return;
    var scale = Math.min(
      width / (bounds.width + 80),
      height / (bounds.height + 80),
      1.5
    );
    var tx = (width - bounds.width * scale) / 2 - bounds.x * scale;
    var ty = (height - bounds.height * scale) / 2 - bounds.y * scale;
    svg.transition().duration(500)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  });
})();
</script>
