<script>
(function() {
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js';
  script.onload = initGraph;
  script.onerror = function() {
    document.getElementById('graph-container').innerHTML =
      '<p style="text-align:center;padding:3rem;color:#888;">D3.js failed to load</p>';
  };
  document.head.appendChild(script);

  function initGraph() {
    var data = window.__graphData;
    if (!data || !data.nodes.length) {
      document.getElementById('graph-container').innerHTML =
        '<p style="text-align:center;padding:3rem;color:#888;">No graph data</p>';
      return;
    }

    var CATEGORY_COLORS = {
      'Unity': '#e84393', 'Unreal': '#e84393', 'AI': '#00b894',
      'Common': '#e84393', 'Csharp': '#e17055', 'ETC': '#a29bfe',
      'Language': '#fdcb6e', 'Python': '#00b894', 'ML': '#00b894',
      'Mathematics': '#74b9ff', 'Toyverse': '#fd79a8', 'TheQuesting': '#e17055',
      'Survivor': '#00cec9', 'CS': '#00b894', 'ProjectAliveRevive': '#fdcb6e'
    };
    var DEFAULT_COLOR = '#e84393';
    function getColor(cat) { return CATEGORY_COLORS[cat] || DEFAULT_COLOR; }

    var container = document.getElementById('graph-container');
    var width = container.clientWidth || 900;
    var height = Math.max(650, window.innerHeight - 280);

    var svg = d3.select('#graph-svg').attr('width', width).attr('height', height);
    var g = svg.append('g');

    var zoom = d3.zoom().scaleExtent([0.15, 4])
      .on('zoom', function(event) { g.attr('transform', event.transform); });
    svg.call(zoom);

    var nodes = data.nodes.map(function(d) { return Object.assign({}, d); });
    var edges = data.edges.map(function(d) { return Object.assign({}, d); });

    var linkCounts = {};
    edges.forEach(function(e) {
      linkCounts[e.source] = (linkCounts[e.source] || 0) + 1;
      linkCounts[e.target] = (linkCounts[e.target] || 0) + 1;
    });
    nodes.forEach(function(n) { n._links = linkCounts[n.id] || 0; });

    function getRadius(d) { return Math.min(3 + d._links * 1.5, 18); }

    /* Info badge */
    var infoEl = document.getElementById('graph-info');
    if (infoEl) infoEl.textContent = nodes.length + ' nodes \u00b7 ' + edges.length + ' edges';

    var simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(function(d) { return d.id; }).distance(80))
      .force('charge', d3.forceManyBody().strength(-200).distanceMax(500))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(function(d) { return getRadius(d) + 8; }))
      .force('x', d3.forceX(width / 2).strength(0.02))
      .force('y', d3.forceY(height / 2).strength(0.02));

    var linkGroup = g.append('g');
    var link = linkGroup.selectAll('line').data(edges).join('line')
      .attr('stroke', function(d) { return d.type === 'prerequisite' ? '#f39c12' : '#0abde3'; })
      .attr('stroke-width', function(d) {
        if (d.type === 'series') return 1.2;
        if (d.type === 'prerequisite') return 1.5;
        return 0.5;
      })
      .attr('stroke-opacity', function(d) {
        if (d.type === 'series') return 0.35;
        if (d.type === 'prerequisite') return 0.5;
        return 0.15;
      });

    var nodeGroup = g.append('g');
    var node = nodeGroup.selectAll('g').data(nodes).join('g')
      .attr('class', 'graph-node')
      .call(d3.drag()
        .on('start', function(event) {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          event.subject.fx = event.subject.x; event.subject.fy = event.subject.y;
        })
        .on('drag', function(event) {
          event.subject.fx = event.x; event.subject.fy = event.y;
        })
        .on('end', function(event) {
          if (!event.active) simulation.alphaTarget(0);
          event.subject.fx = null; event.subject.fy = null;
        }));

    node.append('circle')
      .attr('r', function(d) { return getRadius(d); })
      .attr('fill', function(d) { return getColor(d.cat0); })
      .attr('stroke', 'none');

    node.append('text')
      .text(function(d) {
        var maxLen = d._links >= 4 ? 20 : 14;
        return d.title.length > maxLen ? d.title.substring(0, maxLen) + '..' : d.title;
      })
      .attr('dx', function(d) { return getRadius(d) + 4; })
      .attr('dy', '0.35em')
      .attr('class', 'graph-label')
      .style('font-size', function(d) {
        if (d._links >= 6) return '11px';
        if (d._links >= 3) return '10px';
        return '9px';
      })
      .style('opacity', function(d) {
        if (d._links >= 3) return 0.9;
        if (d._links >= 1) return 0.6;
        return 0;
      });

    var tooltip = d3.select('#graph-tooltip');

    node.on('mouseover', function(event, d) {
      d3.select(this).select('text').style('opacity', 1).style('font-size', '12px');
      d3.select(this).select('circle').attr('stroke', '#fff').attr('stroke-width', 2);
      tooltip.style('display', 'block')
        .style('left', (event.pageX + 14) + 'px')
        .style('top', (event.pageY - 14) + 'px')
        .html(
          '<strong>' + d.title + '</strong><br>' +
          '<span class="tt-cat">' + d.cat0 + (d.cat1 ? ' / ' + d.cat1 : '') + '</span><br>' +
          '<span class="tt-date">' + d.date + '</span>' +
          (d.tags && d.tags.length ? '<br><span class="tt-tags">' + d.tags.slice(0, 5).join(', ') + '</span>' : '')
        );
      var connected = {};
      connected[d.id] = true;
      link.attr('stroke-opacity', function(l) {
        var src = l.source.id || l.source, tgt = l.target.id || l.target;
        if (src === d.id || tgt === d.id) { connected[src] = true; connected[tgt] = true; return 0.9; }
        return 0.03;
      }).attr('stroke-width', function(l) {
        var src = l.source.id || l.source, tgt = l.target.id || l.target;
        return (src === d.id || tgt === d.id) ? 2.5 : 0.3;
      });
      node.select('circle').attr('opacity', function(n) { return connected[n.id] ? 1 : 0.1; });
      node.select('text').style('opacity', function(n) { return connected[n.id] ? 1 : 0; });
    })
    .on('mousemove', function(event) {
      tooltip.style('left', (event.pageX + 14) + 'px').style('top', (event.pageY - 14) + 'px');
    })
    .on('mouseout', function() {
      tooltip.style('display', 'none');
      d3.select(this).select('circle').attr('stroke', 'none');
      d3.select(this).select('text')
        .style('font-size', function(d) { if (d._links >= 6) return '11px'; if (d._links >= 3) return '10px'; return '9px'; })
        .style('opacity', function(d) { if (d._links >= 3) return 0.9; if (d._links >= 1) return 0.6; return 0; });
      link.attr('stroke-opacity', function(d) { if (d.type === 'series') return 0.35; if (d.type === 'prerequisite') return 0.5; return 0.15; })
          .attr('stroke-width', function(d) { if (d.type === 'series') return 1.2; if (d.type === 'prerequisite') return 1.5; return 0.5; });
      node.select('circle').attr('opacity', 1);
    })
    .on('click', function(event, d) { window.location.href = d.id; });

    simulation.on('tick', function() {
      link.attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
          .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
      node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
    });

    /* === Fit-to-view helper (reusable) === */
    function fitToView(animate) {
      var bounds = g.node().getBBox();
      if (bounds.width === 0) return;
      var s = Math.min(width / (bounds.width + 100), height / (bounds.height + 100), 1.2);
      var tx = (width - bounds.width * s) / 2 - bounds.x * s;
      var ty = (height - bounds.height * s) / 2 - bounds.y * s;
      var t = d3.zoomIdentity.translate(tx, ty).scale(s);
      if (animate) { svg.transition().duration(400).call(zoom.transform, t); }
      else { svg.call(zoom.transform, t); }
    }

    /* Initial fit: only ONCE */
    var initialFitDone = false;
    simulation.on('end', function() {
      if (!initialFitDone) { initialFitDone = true; fitToView(true); }
    });

    /* === Toolbar === */
    var zoomInBtn = document.getElementById('graph-zoom-in');
    var zoomOutBtn = document.getElementById('graph-zoom-out');
    var fitBtn = document.getElementById('graph-fit');
    var resetBtn = document.getElementById('graph-reset');
    var fsBtn = document.getElementById('graph-fullscreen');

    if (zoomInBtn) zoomInBtn.addEventListener('click', function() {
      svg.transition().duration(300).call(zoom.scaleBy, 1.5);
    });
    if (zoomOutBtn) zoomOutBtn.addEventListener('click', function() {
      svg.transition().duration(300).call(zoom.scaleBy, 0.67);
    });
    if (fitBtn) fitBtn.addEventListener('click', function() { fitToView(true); });
    if (resetBtn) resetBtn.addEventListener('click', function() {
      svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
    });
    if (fsBtn) fsBtn.addEventListener('click', function() {
      if (!document.fullscreenElement) {
        container.requestFullscreen().then(function() {
          fsBtn.querySelector('i').className = 'fas fa-compress-arrows-alt';
        });
      } else {
        document.exitFullscreen().then(function() {
          fsBtn.querySelector('i').className = 'fas fa-expand-arrows-alt';
        });
      }
    });

    document.addEventListener('fullscreenchange', function() {
      setTimeout(function() {
        width = container.clientWidth || 900;
        height = container.clientHeight || Math.max(650, window.innerHeight - 280);
        svg.attr('width', width).attr('height', height);
        simulation.force('center', d3.forceCenter(width / 2, height / 2));
        simulation.alpha(0.3).restart();
        if (!document.fullscreenElement && fsBtn) {
          fsBtn.querySelector('i').className = 'fas fa-expand-arrows-alt';
        }
      }, 100);
    });

    /* Filters */
    var categories = {};
    nodes.forEach(function(n) { if (n.cat0) categories[n.cat0] = true; });
    var catSelect = document.getElementById('graph-category-filter');
    if (catSelect) {
      Object.keys(categories).sort().forEach(function(cat) {
        var opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat; catSelect.appendChild(opt);
      });
      catSelect.addEventListener('change', applyFilters);
    }
    var edgeFilter = document.getElementById('graph-edge-filter');
    if (edgeFilter) edgeFilter.addEventListener('change', applyFilters);
    var searchInput = document.getElementById('graph-search');
    var searchTimer;
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        clearTimeout(searchTimer); searchTimer = setTimeout(applyFilters, 200);
      });
    }

    function applyFilters() {
      var catVal = catSelect ? catSelect.value : 'all';
      var edgeVal = edgeFilter ? edgeFilter.value : 'all';
      var searchVal = searchInput ? searchInput.value.toLowerCase().trim() : '';
      var visibleNodes = {};
      nodes.forEach(function(n) {
        visibleNodes[n.id] = (catVal === 'all' || n.cat0 === catVal) && (!searchVal || n.title.toLowerCase().indexOf(searchVal) >= 0);
      });
      link.attr('display', function(d) {
        var src = d.source.id || d.source, tgt = d.target.id || d.target;
        return ((edgeVal === 'all' || d.type === edgeVal) && visibleNodes[src] && visibleNodes[tgt]) ? null : 'none';
      });
      node.select('circle').attr('opacity', function(n) { return visibleNodes[n.id] ? 1 : 0.08; });
      node.select('text').style('opacity', function(n) { return visibleNodes[n.id] ? 0.9 : 0; });
    }

    window.addEventListener('resize', function() {
      if (document.fullscreenElement) return;
      width = container.clientWidth || 900;
      height = Math.max(650, window.innerHeight - 280);
      svg.attr('width', width).attr('height', height);
      simulation.force('center', d3.forceCenter(width / 2, height / 2));
      simulation.alpha(0.3).restart();
    });
  }
})();
</script>
