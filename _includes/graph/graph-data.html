<script>
(function() {
  var nodes = [
    {% for post in site.posts %}
    {
      "id": {{ post.url | jsonify }},
      "title": {{ post.title | jsonify }},
      "date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
      "cat0": {{ post.categories[0] | default: "" | jsonify }},
      "cat1": {{ post.categories[1] | default: "" | jsonify }},
      "tags": {{ post.tags | default: "" | jsonify }},
      "difficulty": {{ post.difficulty | default: "" | jsonify }},
      "prerequisites": {{ post.prerequisites | default: "" | jsonify }}
    },
    {% endfor %}
  ];

  var edges = [];

  /* Series edges */
  var seriesMap = {};
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    if (n.cat1) {
      var key = n.cat0 + "|" + n.cat1;
      if (!seriesMap[key]) seriesMap[key] = [];
      seriesMap[key].push(n);
    }
  }
  Object.keys(seriesMap).forEach(function(key) {
    var group = seriesMap[key].sort(function(a, b) {
      return a.date.localeCompare(b.date);
    });
    for (var i = 0; i < group.length - 1; i++) {
      edges.push({ source: group[i].id, target: group[i + 1].id, type: "series" });
    }
  });

  /* Prerequisite edges */
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    if (n.prerequisites && Array.isArray(n.prerequisites)) {
      for (var j = 0; j < n.prerequisites.length; j++) {
        var prereqUrl = n.prerequisites[j];
        if (prereqUrl && prereqUrl.charAt(prereqUrl.length - 1) !== '/') { prereqUrl += '/'; }
        edges.push({ source: prereqUrl, target: n.id, type: "prerequisite" });
      }
    }
  }

  /* Tag-based edges (threshold 3) */
  var nodeEdgeMap = {};
  function markEdge(a, b) { nodeEdgeMap[a + '|' + b] = true; nodeEdgeMap[b + '|' + a] = true; }
  edges.forEach(function(e) { markEdge(e.source, e.target); });

  for (var i = 0; i < nodes.length; i++) {
    for (var j = i + 1; j < nodes.length; j++) {
      var a = nodes[i], b = nodes[j];
      if (!a.tags || !a.tags.length || !b.tags || !b.tags.length) continue;
      if (nodeEdgeMap[a.id + '|' + b.id]) continue;
      var common = 0;
      for (var k = 0; k < a.tags.length; k++) {
        if (b.tags.indexOf(a.tags[k]) >= 0) common++;
      }
      if (common >= 3) {
        edges.push({ source: a.id, target: b.id, type: "tag", weight: common });
        markEdge(a.id, b.id);
      }
    }
  }

  /* Remove edges referencing non-existent nodes */
  var nodeIds = {};
  for (var i = 0; i < nodes.length; i++) nodeIds[nodes[i].id] = true;
  edges = edges.filter(function(e) { return nodeIds[e.source] && nodeIds[e.target]; });

  /* === Isolated node rescue === */
  var connectedSet = {};
  edges.forEach(function(e) { connectedSet[e.source] = true; connectedSet[e.target] = true; });

  /* A: Lower threshold to 2 for isolated nodes */
  var isolated = nodes.filter(function(n) { return !connectedSet[n.id]; });
  for (var i = 0; i < isolated.length; i++) {
    var a = isolated[i];
    if (!a.tags || !a.tags.length) continue;
    for (var j = 0; j < nodes.length; j++) {
      var b = nodes[j];
      if (a.id === b.id || !b.tags || !b.tags.length) continue;
      if (nodeEdgeMap[a.id + '|' + b.id]) continue;
      var common = 0;
      for (var k = 0; k < a.tags.length; k++) {
        if (b.tags.indexOf(a.tags[k]) >= 0) common++;
      }
      if (common >= 2) {
        edges.push({ source: a.id, target: b.id, type: "tag", weight: common });
        markEdge(a.id, b.id);
        connectedSet[a.id] = true;
        connectedSet[b.id] = true;
        break;
      }
    }
  }

  /* C: Nearest neighbor for still-isolated nodes */
  isolated = nodes.filter(function(n) { return !connectedSet[n.id]; });
  for (var i = 0; i < isolated.length; i++) {
    var a = isolated[i];
    var bestId = null, bestScore = 0;
    for (var j = 0; j < nodes.length; j++) {
      var b = nodes[j];
      if (a.id === b.id) continue;
      var score = 0;
      /* tag overlap */
      if (a.tags && a.tags.length && b.tags && b.tags.length) {
        for (var k = 0; k < a.tags.length; k++) {
          if (b.tags.indexOf(a.tags[k]) >= 0) score += 2;
        }
      }
      /* same top category */
      if (a.cat0 && a.cat0 === b.cat0) score += 1;
      if (score > bestScore) { bestScore = score; bestId = b.id; }
    }
    if (bestId) {
      edges.push({ source: a.id, target: bestId, type: "tag", weight: 1 });
      markEdge(a.id, bestId);
    }
  }

  window.__graphData = { nodes: nodes, edges: edges };
})();
</script>
